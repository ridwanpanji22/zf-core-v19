worker_processes 1;
events { worker_connections 256; }

http {
    # WebSocket-only reverse proxy — no static files, no buffering
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8443 ssl;
        server_name wszf.nexacore.my.id;

        # Cloudflare Origin CA cert — trusted by Cloudflare proxy,
        # also valid for direct (DNS-only) connections.
        ssl_certificate     /etc/nginx/certs/self.crt;
        ssl_certificate_key /etc/nginx/certs/self.key;

        # Only allow WebSocket upgrade requests
        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket keepalive — drop idle connections after 1h
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Reject everything else
        location / {
            return 444;
        }
    }
}
